name: Continuous Deployment

on:
  push:
    branches: [main, 'release/**']

permissions:
  id-token: write   # Required for OIDC
  contents: write   # Required for updating npm versions
  issues: write
  pull-requests: write

jobs:
  resolve-version:
    uses: 2060-io/organization/.github/workflows/resolve-version-call.yml@main

  docker:
    needs: resolve-version
    if: needs.resolve-version.outputs.new-release-published == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: vs-agent
            dockerfile: ./apps/vs-agent/Dockerfile
            target: vs-agent
          - image: vs-agent-chat
            dockerfile: ./apps/vs-agent/Dockerfile
            target: vs-agent-chat
          - image: vs-agent-mrtd
            dockerfile: ./apps/vs-agent/Dockerfile
            target: vs-agent-mrtd
          - image: vs-agent-demo-chatbot-backend
            dockerfile: ./examples/chatbot/Dockerfile

    env:
      RELEASE_TYPE: ${{ needs.resolve-version.outputs.release-type }}
      RELEASE_VERSION: ${{ needs.resolve-version.outputs.release-version }}
      RELEASE_MAJOR: ${{ needs.resolve-version.outputs.release-major }}
      RELEASE_MINOR: ${{ needs.resolve-version.outputs.release-minor }}
      RELEASE_PATCH: ${{ needs.resolve-version.outputs.release-patch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute tags
        id: tags
        run: |
          HUB="${{ secrets.DOCKER_HUB_LOGIN }}/${{ matrix.image }}"
          if [ "$RELEASE_TYPE" = "stable" ]; then
            TAGS="${HUB}:latest
          ${HUB}:v${RELEASE_MAJOR}
          ${HUB}:v${RELEASE_MAJOR}.${RELEASE_MINOR}
          ${HUB}:${RELEASE_VERSION}"
          else
            P="${RELEASE_PATCH:0:1}"
            TAGS="${HUB}:dev
          ${HUB}:v${RELEASE_MAJOR}-dev
          ${HUB}:v${RELEASE_MAJOR}.${RELEASE_MINOR}-dev
          ${HUB}:v${RELEASE_MAJOR}.${RELEASE_MINOR}.${P}-dev
          ${HUB}:${RELEASE_VERSION}"
          fi
          {
            echo "list<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_LOGIN }}
          password: ${{ secrets.DOCKER_HUB_PWD }}

      - name: Build & push ${{ matrix.image }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.tags.outputs.list }}

  helm:
    needs: [resolve-version, docker]
    if: needs.resolve-version.outputs.new-release-published == 'true'
    runs-on: ubuntu-latest
    env:
      RELEASE_TYPE: ${{ needs.resolve-version.outputs.release-type }}
      RELEASE_VERSION: ${{ needs.resolve-version.outputs.release-version }}
      RELEASE_MAJOR: ${{ needs.resolve-version.outputs.release-major }}
      RELEASE_MINOR: ${{ needs.resolve-version.outputs.release-minor }}
      RELEASE_PATCH: ${{ needs.resolve-version.outputs.release-patch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_LOGIN }}
          password: ${{ secrets.DOCKER_HUB_PWD }}

      - name: Push Helm chart to Docker Hub OCI repo
        run: |
          if [ "$RELEASE_TYPE" = "stable" ]; then
            TAGS=("${RELEASE_VERSION}")
          else
            TAGS=(
              "v${RELEASE_MAJOR}.${RELEASE_MINOR}.${RELEASE_PATCH:0:1}-dev"
              "${RELEASE_VERSION}"
            )
          fi
          CHART_NAME=$(grep '^name:' ./charts/vs-agent/Chart.yaml | awk '{print $2}')
          for tag in "${TAGS[@]}"; do
            helm dependency update ./charts/vs-agent
            helm package ./charts/vs-agent --version $tag -d ./charts
            helm push ./charts/${CHART_NAME}-$tag.tgz oci://docker.io/${{ secrets.DOCKER_HUB_LOGIN }}
          done

      - name: Push Helm chart Chatbot Demo to Docker Hub OCI repo
        run: |
          if [ "$RELEASE_TYPE" = "stable" ]; then
            TAGS=("${RELEASE_VERSION}")
          else
            TAGS=(
              "v${RELEASE_MAJOR}.${RELEASE_MINOR}.${RELEASE_PATCH:0:1}-dev"
              "${RELEASE_VERSION}"
            )
          fi
          # update the dependencies version in the Chart.yaml
          sed -i "s/^\([[:space:]]*version:\).*/\1 $RELEASE_VERSION/" ./charts/chatbot/Chart.yaml
          CHART_NAME=$(grep '^name:' ./charts/chatbot/Chart.yaml | awk '{print $2}')
          for tag in "${TAGS[@]}"; do
            helm dependency update ./charts/chatbot
            helm package ./charts/chatbot --version $tag -d ./charts
            helm push ./charts/${CHART_NAME}-$tag.tgz oci://docker.io/${{ secrets.DOCKER_HUB_LOGIN }}
          done

  npm-publish:
    needs: [resolve-version]
    if: needs.resolve-version.outputs.new-release-published == 'true'
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ needs.resolve-version.outputs.release-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pnpm version has been pinned in package.json
      - name: Setup node v22
        uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
          registry-url: 'https://registry.npmjs.org'

      - name: Corepack pnpm
        run: |
          npm install -g npm@11.11.0
          corepack enable
          
      - name: Install dependencies
        run: |
          pnpm install
          pnpm build

      - name: Set version for apps and packages
        run: |
          pnpm -r --topological version "$RELEASE_VERSION"

      # --no-git-checks is used due to topological version updating.
      - name: Publish NPM packages
        run: |
          pnpm -r publish --no-git-checks --access public

