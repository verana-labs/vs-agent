name: Continuous Deployment

on:
  push:
    branches: [main, 'release/**', 'v[0-9]*']
  workflow_dispatch:
    inputs:
      notify_tag:
        description: "Release tag to (re)announce on Discord, e.g. v1.2.0"
        required: true
        type: string

permissions:
  id-token: write   # Required for OIDC
  contents: write   # Required for updating npm versions
  issues: write
  pull-requests: write

jobs:
  resolve-version:
    if: github.event_name == 'push'
    uses: 2060-io/organization/.github/workflows/resolve-version-call.yml@41008f619521ec154b02a7065ad332fad445a2fd # v0.5.1
    with:
      # Maintenance branches (v1, v1.11, …) anchor their dev prereleases to the branch itself;
      # on main this resolves to 'main', matching the reusable workflow's default.
      prerelease-branch: ${{ github.ref_name }}

  docker:
    needs: resolve-version
    if: needs.resolve-version.outputs.new-release-published == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
       include:
          - image: vs-agent
            dockerfile: ./apps/vs-agent/Dockerfile
            target: vs-agent
          - image: vs-agent-chat
            dockerfile: ./apps/vs-agent/Dockerfile
            target: vs-agent-chat
          - image: vs-agent-mrtd
            dockerfile: ./apps/vs-agent/Dockerfile
            target: vs-agent-mrtd
          - image: vs-agent-demo-chatbot-backend
            dockerfile: ./examples/chatbot/Dockerfile

    env:
      RELEASE_TYPE: ${{ needs.resolve-version.outputs.release-type }}
      RELEASE_VERSION: ${{ needs.resolve-version.outputs.release-version }}
      RELEASE_MAJOR: ${{ needs.resolve-version.outputs.release-major }}
      RELEASE_MINOR: ${{ needs.resolve-version.outputs.release-minor }}
      RELEASE_PATCH: ${{ needs.resolve-version.outputs.release-patch }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Compute tags
        id: tags
        env:
          IS_MAIN: ${{ github.ref_name == 'main' }}
        run: |
          HUB="${{ secrets.DOCKER_HUB_LOGIN }}/${{ matrix.image }}"
          # The fully-qualified, immutable version tag is always published.
          TAGS="${HUB}:${RELEASE_VERSION}"
          if [ "$RELEASE_TYPE" = "stable" ]; then
            # Minor-line pointer (e.g. v1.11): owned by whichever branch maintains that line.
            TAGS="${TAGS}
          ${HUB}:v${RELEASE_MAJOR}.${RELEASE_MINOR}"
            # Cross-line floating pointers only from the default branch (main). A maintenance
            # branch (e.g. v1.11) must never move 'latest' or the major (v1) pointer backwards.
            if [ "$IS_MAIN" = "true" ]; then
              TAGS="${TAGS}
          ${HUB}:latest
          ${HUB}:v${RELEASE_MAJOR}"
            fi
          else
            P="${RELEASE_PATCH:0:1}"
            # Patch-level -dev pointer (e.g. v1.11.1-dev).
            TAGS="${TAGS}
          ${HUB}:v${RELEASE_MAJOR}.${RELEASE_MINOR}.${P}-dev"
            # Floating dev pointers ('dev', v1.11-dev) only from the default branch (main).
            if [ "$IS_MAIN" = "true" ]; then
              TAGS="${TAGS}
          ${HUB}:dev
          ${HUB}:v${RELEASE_MAJOR}.${RELEASE_MINOR}-dev"
            fi
          fi
          {
            echo "list<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Docker login
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKER_HUB_LOGIN }}
          password: ${{ secrets.DOCKER_HUB_PWD }}

      - name: Build & push ${{ matrix.image }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.tags.outputs.list }}

  helm:
    needs: [resolve-version, docker]
    if: needs.resolve-version.outputs.new-release-published == 'true'
    runs-on: ubuntu-latest
    env:
      RELEASE_TYPE: ${{ needs.resolve-version.outputs.release-type }}
      RELEASE_VERSION: ${{ needs.resolve-version.outputs.release-version }}
      RELEASE_MAJOR: ${{ needs.resolve-version.outputs.release-major }}
      RELEASE_MINOR: ${{ needs.resolve-version.outputs.release-minor }}
      RELEASE_PATCH: ${{ needs.resolve-version.outputs.release-patch }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Docker login
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKER_HUB_LOGIN }}
          password: ${{ secrets.DOCKER_HUB_PWD }}

      - name: Push Helm chart to Docker Hub OCI repo
        run: |
          if [ "$RELEASE_TYPE" = "stable" ]; then
            TAGS=("${RELEASE_VERSION}")
          else
            TAGS=(
              "v${RELEASE_MAJOR}.${RELEASE_MINOR}.${RELEASE_PATCH:0:1}-dev"
              "${RELEASE_VERSION}"
            )
          fi
          CHART_NAME=$(grep '^name:' ./charts/vs-agent/Chart.yaml | awk '{print $2}')
          for tag in "${TAGS[@]}"; do
            helm dependency update ./charts/vs-agent
            helm package ./charts/vs-agent --version $tag -d ./charts
            helm push ./charts/${CHART_NAME}-$tag.tgz oci://docker.io/${{ secrets.DOCKER_HUB_LOGIN }}
          done

      - name: Push Helm chart Chatbot Demo to Docker Hub OCI repo
        run: |
          if [ "$RELEASE_TYPE" = "stable" ]; then
            TAGS=("${RELEASE_VERSION}")
          else
            TAGS=(
              "v${RELEASE_MAJOR}.${RELEASE_MINOR}.${RELEASE_PATCH:0:1}-dev"
              "${RELEASE_VERSION}"
            )
          fi
          # update the dependencies version in the Chart.yaml
          sed -i "s/^\([[:space:]]*version:\).*/\1 $RELEASE_VERSION/" ./charts/chatbot/Chart.yaml
          CHART_NAME=$(grep '^name:' ./charts/chatbot/Chart.yaml | awk '{print $2}')
          for tag in "${TAGS[@]}"; do
            helm dependency update ./charts/chatbot
            helm package ./charts/chatbot --version $tag -d ./charts
            helm push ./charts/${CHART_NAME}-$tag.tgz oci://docker.io/${{ secrets.DOCKER_HUB_LOGIN }}
          done

  npm-publish:
    needs: [resolve-version]
    if: needs.resolve-version.outputs.new-release-published == 'true'
    runs-on: ubuntu-latest
    env:
      RELEASE_TYPE: ${{ needs.resolve-version.outputs.release-type }}
      RELEASE_VERSION: ${{ needs.resolve-version.outputs.release-version }}
      RELEASE_MAJOR: ${{ needs.resolve-version.outputs.release-major }}
      RELEASE_MINOR: ${{ needs.resolve-version.outputs.release-minor }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Pnpm version has been pinned in package.json
      - name: Setup node v22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.14.0'
          registry-url: 'https://registry.npmjs.org'

      - name: Corepack pnpm
        run: |
          npm install -g npm@11.11.0
          corepack enable
          
      - name: Install dependencies
        run: |
          pnpm install
          pnpm build

      - name: Set version for apps and packages
        run: |
          pnpm -r --topological version "$RELEASE_VERSION"

      # --no-git-checks is used due to topological version updating.
      - name: Publish NPM packages
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            # Default branch: unchanged behaviour (stable -> 'latest', dev -> 'latest').
            pnpm -r publish --no-git-checks --access public
          elif [ "$RELEASE_TYPE" = "stable" ]; then
            # Maintenance branch stable release: track the line pointer, never move 'latest'.
            pnpm -r publish --no-git-checks --access public --tag "v${RELEASE_MAJOR}.${RELEASE_MINOR}"
          else
            # Maintenance branch dev release: separate pointer so it doesn't move the line's
            # stable tag, and never 'latest'.
            pnpm -r publish --no-git-checks --access public --tag "v${RELEASE_MAJOR}.${RELEASE_MINOR}-dev"
          fi


  discord-notify:
    needs: [resolve-version, docker, helm]
    if: needs.resolve-version.outputs.new-release-published == 'true' && needs.resolve-version.outputs.release-type == 'stable'
    permissions:
      contents: read
    uses: 2060-io/organization/.github/workflows/discord-release-notify-call.yml@251db2251120e805474da6528dfafd9693379b6e # main
    with:
      tag_name: ${{ needs.resolve-version.outputs.release-version }}
    secrets:
      DISCORD_UPDATES_WEBHOOK_URL: ${{ secrets.DISCORD_UPDATES_WEBHOOK_URL }}

  discord-notify-manual:
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    uses: 2060-io/organization/.github/workflows/discord-release-notify-call.yml@251db2251120e805474da6528dfafd9693379b6e # main
    with:
      tag_name: ${{ inputs.notify_tag }}
    secrets:
      DISCORD_UPDATES_WEBHOOK_URL: ${{ secrets.DISCORD_UPDATES_WEBHOOK_URL }}
