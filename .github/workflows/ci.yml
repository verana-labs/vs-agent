name: Continuous Integration

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: 2060-io/organization/.github/workflows/2060-linter-call.yml@251db2251120e805474da6528dfafd9693379b6e # main

  docker-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: ./apps/vs-agent/Dockerfile
            target: vs-agent
          - dockerfile: ./apps/vs-agent/Dockerfile
            target: vs-agent-chat
          - dockerfile: ./apps/vs-agent/Dockerfile
            target: vs-agent-mrtd
          - dockerfile: ./examples/chatbot/Dockerfile
          - dockerfile: ./examples/verifier/Dockerfile
          - dockerfile: ./examples/nestjs-vs/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build ${{ matrix.dockerfile }} ${{ matrix.target }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
