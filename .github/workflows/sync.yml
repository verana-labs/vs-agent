name: Sync monorepo versions

on:
  workflow_run:
    workflows: ["Continuous Deployment"]
    types:
      - completed

jobs:
  sync-versions:
    runs-on: ubuntu-latest

    steps:
      - name: Find release-please PR
        id: pr
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:release-please--branches--main--components--vs-agent`
            })

            if (prs.data.length === 0) {
              core.setFailed('No open release-please PR found')
            }

            core.setOutput('branch', prs.data[0].head.ref)

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.pr.outputs.branch }}
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - run: corepack enable
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Read root version
        id: version
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
          echo "current=$(node -p "require('./apps/vs-agent/package.json').version")" >> $GITHUB_OUTPUT

      - name: Sync versions
        run: |
          if [ "${{ steps.version.outputs.version }}" != "${{ steps.version.outputs.current }}" ]; then
            pnpm -r --topological --ignore-scripts version ${{ steps.version.outputs.version }} --no-git-tag-version
          else
            echo "Version already ${{ steps.version.outputs.version }}, skipping"
          fi

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "chore: sync package versions"
          git push origin HEAD:${{ steps.pr.outputs.branch }}
